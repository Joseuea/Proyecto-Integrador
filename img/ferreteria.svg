<?xml version="1.0" encoding="UTF-8"?>
<!-- Imagen ilustrativa del negocio: camión de fletes con materiales de construcción -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Camión de la ferretería con materiales de construcción">
  <!-- Fondo con degradado de cielo -->
  <defs>
    <linearGradient id="cielo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe8f7"/>
      <stop offset="100%" stop-color="#f5f1ea"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cielo)"/>
  <!-- Sol -->
  <circle cx="340" cy="50" r="24" fill="#f2b705"/>
  <!-- Suelo / carretera -->
  <rect y="220" width="400" height="80" fill="#8d8d8d"/>
  <rect y="255" width="60" height="6" fill="#ffffff"/>
  <rect x="90" y="255" width="60" height="6" fill="#ffffff"/>
  <rect x="180" y="255" width="60" height="6" fill="#ffffff"/>
  <rect x="270" y="255" width="60" height="6" fill="#ffffff"/>
  <!-- Pila de bloques a la derecha -->
  <g stroke="#6d6d6d" stroke-width="2">
    <rect x="300" y="180" width="42" height="22" fill="#bdbdbd"/>
    <rect x="344" y="180" width="42" height="22" fill="#c9c9c9"/>
    <rect x="322" y="156" width="42" height="22" fill="#c9c9c9"/>
  </g>
  <!-- Sacos de cemento -->
  <g stroke="#a06a2c" stroke-width="2">
    <rect x="258" y="192" width="30" height="34" rx="5" fill="#d9a45b"/>
    <rect x="262" y="186" width="30" height="34" rx="5" fill="#e3b26b"/>
  </g>
  <!-- Varillas de hierro apoyadas -->
  <g stroke="#5c6b73" stroke-width="5" stroke-linecap="round">
    <line x1="230" y1="226" x2="290" y2="150"/>
    <line x1="240" y1="226" x2="298" y2="154"/>
    <line x1="250" y1="226" x2="306" y2="158"/>
  </g>
  <!-- Camión: balde de carga -->
  <rect x="40" y="140" width="150" height="66" rx="6" fill="#e65c00" stroke="#bf4a00" stroke-width="3"/>
  <!-- Carga dentro del balde (arena) -->
  <path d="M48 140 q35 -26 70 0 q35 -22 64 0 z" fill="#d9a45b"/>
  <!-- Camión: cabina -->
  <path d="M190 156 h48 l22 26 v24 h-70 z" fill="#37474f" stroke="#263238" stroke-width="3"/>
  <!-- Ventana de la cabina -->
  <path d="M198 164 h34 l16 20 h-50 z" fill="#cfe8f7"/>
  <!-- Chasis -->
  <rect x="36" y="206" width="228" height="12" fill="#263238"/>
  <!-- Ruedas -->
  <g fill="#1c1c1c" stroke="#4d4d4d" stroke-width="4">
    <circle cx="80" cy="226" r="18"/>
    <circle cx="130" cy="226" r="18"/>
    <circle cx="228" cy="226" r="18"/>
  </g>
  <g fill="#8d8d8d">
    <circle cx="80" cy="226" r="7"/>
    <circle cx="130" cy="226" r="7"/>
    <circle cx="228" cy="226" r="7"/>
  </g>
  <!-- Rótulo JM en el balde -->
  <text x="115" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">JM</text>
  <!-- Nombre del negocio -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#263238">JM Ferretería · Construyendo tus sueños</text>
</svg>
